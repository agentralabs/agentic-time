name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agentic-time-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: agentic-time-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agentic-time-darwin-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agentic-time-darwin-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIR="agentic-time-${VERSION}"
          mkdir -p "$DIR"
          cp target/${{ matrix.target }}/release/atime "$DIR/" 2>/dev/null || true
          cp target/${{ matrix.target }}/release/agentic-time-mcp "$DIR/" 2>/dev/null || true
          tar czf "${{ matrix.artifact }}.tar.gz" "$DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: "*.tar.gz"

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.tar.gz"
          generate_release_notes: true
