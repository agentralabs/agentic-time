<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" width="980" height="320">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#11111b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Terminal window -->
  <rect width="980" height="320" fill="url(#termBg)" rx="12" />

  <!-- Title bar -->
  <rect width="980" height="36" fill="#2a2a3e" rx="12" />
  <rect y="24" width="980" height="12" fill="#2a2a3e" />
  <circle cx="20" cy="18" r="6" fill="#ff5f57" />
  <circle cx="40" cy="18" r="6" fill="#febc2e" />
  <circle cx="60" cy="18" r="6" fill="#28c840" />
  <text x="490" y="23" text-anchor="middle" font-family="monospace" font-size="12" fill="#888">agentic-time-mcp</text>

  <!-- Terminal content -->
  <text x="20" y="65" font-family="monospace" font-size="13" fill="#7ee787">$</text>
  <text x="40" y="65" font-family="monospace" font-size="13" fill="#c9d1d9">atime deadline add "Ship v1.0" --due 2026-03-15 --priority high</text>

  <text x="20" y="90" font-family="monospace" font-size="13" fill="#f57c00">+</text>
  <text x="40" y="90" font-family="monospace" font-size="13" fill="#a0a0a0">Deadline #42 created: "Ship v1.0" (high priority, due 2026-03-15)</text>

  <text x="20" y="120" font-family="monospace" font-size="13" fill="#7ee787">$</text>
  <text x="40" y="120" font-family="monospace" font-size="13" fill="#c9d1d9">atime schedule add "Code review" --cron "0 10 * * TUE" --duration 120</text>

  <text x="20" y="145" font-family="monospace" font-size="13" fill="#f57c00">+</text>
  <text x="40" y="145" font-family="monospace" font-size="13" fill="#a0a0a0">Schedule #7 created: "Code review" (every Tue 10:00, 2h)</text>

  <text x="20" y="175" font-family="monospace" font-size="13" fill="#7ee787">$</text>
  <text x="40" y="175" font-family="monospace" font-size="13" fill="#c9d1d9">atime decay query memory-freshness --age 168</text>

  <text x="20" y="200" font-family="monospace" font-size="13" fill="#4a9eff">i</text>
  <text x="40" y="200" font-family="monospace" font-size="13" fill="#a0a0a0">freshness = 0.500 (exponential, halflife = 168h, age = 168h)</text>

  <text x="20" y="230" font-family="monospace" font-size="13" fill="#7ee787">$</text>
  <text x="40" y="230" font-family="monospace" font-size="13" fill="#c9d1d9">atime stats</text>

  <text x="20" y="255" font-family="monospace" font-size="13" fill="#a0a0a0">  Deadlines:     42  |  Schedules:  15  |  Sequences:  3</text>
  <text x="20" y="275" font-family="monospace" font-size="13" fill="#a0a0a0">  Decay configs:  2  |  Total:      62  |  File: project.atime (8.2 KB)</text>

  <text x="20" y="305" font-family="monospace" font-size="13" fill="#7ee787">$</text>
  <text x="40" y="305" font-family="monospace" font-size="13" fill="#555">_</text>
</svg>
