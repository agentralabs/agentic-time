<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 200" width="980" height="200">
  <defs>
    <linearGradient id="bannerBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="980" height="200" fill="url(#bannerBg)" rx="12" />
  <!-- Clock icon -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="#e8e8e8" stroke-width="2.5" />
  <line x1="100" y1="100" x2="100" y2="65" stroke="#e8e8e8" stroke-width="3" stroke-linecap="round" />
  <line x1="100" y1="100" x2="125" y2="85" stroke="#e8e8e8" stroke-width="2" stroke-linecap="round" />
  <circle cx="100" cy="100" r="4" fill="#f57c00" />
  <line x1="100" y1="100" x2="90" y2="62" stroke="#f57c00" stroke-width="1.5" stroke-linecap="round" />
  <!-- Hour markers -->
  <line x1="100" y1="54" x2="100" y2="58" stroke="#e8e8e8" stroke-width="2" />
  <line x1="100" y1="142" x2="100" y2="146" stroke="#e8e8e8" stroke-width="2" />
  <line x1="54" y1="100" x2="58" y2="100" stroke="#e8e8e8" stroke-width="2" />
  <line x1="142" y1="100" x2="146" y2="100" stroke="#e8e8e8" stroke-width="2" />
  <!-- Title -->
  <text x="190" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#e8e8e8">AgenticTime</text>
  <!-- Subtitle -->
  <text x="190" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#a0a0a0">Temporal reasoning for AI agents</text>
  <!-- Decorative timeline dots -->
  <circle cx="700" cy="100" r="6" fill="#f57c00" opacity="0.9" />
  <circle cx="740" cy="100" r="4" fill="#f57c00" opacity="0.7" />
  <circle cx="770" cy="100" r="3" fill="#f57c00" opacity="0.5" />
  <circle cx="795" cy="100" r="2" fill="#f57c00" opacity="0.3" />
  <line x1="706" y1="100" x2="736" y2="100" stroke="#f57c00" stroke-width="1" opacity="0.6" />
  <line x1="744" y1="100" x2="767" y2="100" stroke="#f57c00" stroke-width="1" opacity="0.4" />
  <line x1="773" y1="100" x2="793" y2="100" stroke="#f57c00" stroke-width="1" opacity="0.2" />
  <!-- Decay curve visualization -->
  <path d="M 840 70 Q 870 75, 890 90 Q 910 105, 940 140" fill="none" stroke="#f57c00" stroke-width="2" opacity="0.5" />
  <text x="840" y="60" font-family="monospace" font-size="10" fill="#666">decay</text>
</svg>
