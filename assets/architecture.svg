<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 500" width="980" height="500">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="980" height="500" fill="url(#archBg)" rx="12" />

  <!-- Title -->
  <text x="490" y="40" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">AgenticTime — 4-Crate Architecture</text>

  <!-- Agent layer -->
  <rect x="340" y="60" width="300" height="50" rx="8" fill="#2a2a4a" stroke="#f57c00" stroke-width="2" />
  <text x="490" y="90" text-anchor="middle" font-family="monospace" font-size="14" fill="#f57c00">AI Agent (Claude, GPT, etc.)</text>

  <!-- Arrow down -->
  <line x1="490" y1="110" x2="490" y2="140" stroke="#666" stroke-width="2" />
  <polygon points="485,138 490,148 495,138" fill="#666" />
  <text x="505" y="132" font-family="monospace" font-size="10" fill="#888">MCP (JSON-RPC 2.0)</text>

  <!-- MCP Server crate -->
  <rect x="280" y="150" width="420" height="70" rx="8" fill="#1e3a5f" stroke="#4a9eff" stroke-width="2" />
  <text x="490" y="178" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#4a9eff">agentic-time-mcp</text>
  <text x="490" y="200" text-anchor="middle" font-family="monospace" font-size="11" fill="#8ab4f8">19 tools | resources | prompts | stdio transport</text>

  <!-- Arrow down -->
  <line x1="490" y1="220" x2="490" y2="250" stroke="#666" stroke-width="2" />
  <polygon points="485,248 490,258 495,248" fill="#666" />
  <text x="505" y="240" font-family="monospace" font-size="10" fill="#888">Rust API</text>

  <!-- Core crate -->
  <rect x="280" y="260" width="420" height="80" rx="8" fill="#1a3a1a" stroke="#4caf50" stroke-width="2" />
  <text x="490" y="290" text-anchor="middle" font-family="monospace" font-size="16" font-weight="700" fill="#4caf50">agentic-time-core</text>
  <text x="490" y="310" text-anchor="middle" font-family="monospace" font-size="11" fill="#81c784">Deadline | Duration | Schedule | Sequence | Decay</text>
  <text x="490" y="328" text-anchor="middle" font-family="monospace" font-size="11" fill="#81c784">.atime format (ATIM v1) | conflict detection | decay math</text>

  <!-- Arrow down to file -->
  <line x1="490" y1="340" x2="490" y2="370" stroke="#666" stroke-width="2" />
  <polygon points="485,368 490,378 495,368" fill="#666" />

  <!-- .atime file -->
  <rect x="400" y="380" width="180" height="50" rx="8" fill="#3a2a1a" stroke="#f57c00" stroke-width="2" />
  <text x="490" y="410" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#f57c00">project.atime</text>

  <!-- CLI crate (left) -->
  <rect x="40" y="260" width="200" height="60" rx="8" fill="#2a2a4a" stroke="#bb86fc" stroke-width="1.5" />
  <text x="140" y="285" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#bb86fc">agentic-time-cli</text>
  <text x="140" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#ce93d8">atime command</text>
  <line x1="240" y1="290" x2="280" y2="290" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" />
  <polygon points="278,286 284,290 278,294" fill="#666" />

  <!-- FFI crate (right) -->
  <rect x="740" y="260" width="200" height="60" rx="8" fill="#2a2a4a" stroke="#bb86fc" stroke-width="1.5" />
  <text x="840" y="285" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#bb86fc">agentic-time-ffi</text>
  <text x="840" y="305" text-anchor="middle" font-family="monospace" font-size="10" fill="#ce93d8">C/Python/Node FFI</text>
  <line x1="700" y1="290" x2="740" y2="290" stroke="#666" stroke-width="1.5" stroke-dasharray="4,3" />
  <polygon points="738,286 732,290 738,294" fill="#666" />

  <!-- Language bindings -->
  <rect x="40" y="380" width="120" height="40" rx="6" fill="#2a2a4a" stroke="#666" stroke-width="1" />
  <text x="100" y="405" text-anchor="middle" font-family="monospace" font-size="12" fill="#aaa">Python SDK</text>

  <rect x="180" y="380" width="120" height="40" rx="6" fill="#2a2a4a" stroke="#666" stroke-width="1" />
  <text x="240" y="405" text-anchor="middle" font-family="monospace" font-size="12" fill="#aaa">npm/WASM</text>

  <!-- Sister integration labels -->
  <rect x="640" y="380" width="300" height="90" rx="8" fill="#1a1a2e" stroke="#444" stroke-width="1" />
  <text x="790" y="400" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">Cross-Sister Integration</text>
  <text x="790" y="420" text-anchor="middle" font-family="monospace" font-size="10" fill="#4caf50">.amem (Memory) | .avis (Vision)</text>
  <text x="790" y="438" text-anchor="middle" font-family="monospace" font-size="10" fill="#4a9eff">.acb (Codebase) | .aid (Identity)</text>
  <text x="790" y="456" text-anchor="middle" font-family="monospace" font-size="10" fill="#f57c00">.atime (Time)</text>
</svg>
